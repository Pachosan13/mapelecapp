<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SEMCO — Sin conexión</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 24px;
      }
      .card { max-width: 420px; text-align: center; }
      img { width: 96px; height: auto; margin-bottom: 20px; opacity: 0.95; }
      h1 { font-size: 22px; margin: 0 0 10px; }
      p { font-size: 15px; line-height: 1.5; color: #94a3b8; margin: 0 0 8px; }
      .ok {
        margin-top: 18px;
        display: inline-block;
        background: #064e3b;
        color: #6ee7b7;
        border: 1px solid #065f46;
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 600;
      }
      button {
        margin-top: 22px;
        background: #2563eb;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 12px 22px;
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logosemco.png" alt="SEMCO" />
      <h1>Estás sin conexión</h1>
      <p>No hay señal en este punto (sótano/foso). Es normal en estas áreas.</p>
      <p class="ok">✓ Tus respuestas están guardadas en el equipo</p>
      <p style="margin-top: 16px">
        Se subirán solas apenas recuperes señal. No pierdes nada.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
